<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Catalog Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8 font-sans text-gray-800">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-900 mb-2">Unified Pharma Data Catalog</h1>
            <p class="text-gray-600">Cross-dataset search across Clinical, Safety, and Market domains.</p>
        </header>

        <div class="mb-10 flex shadow-sm rounded-lg overflow-hidden">
            <input 
                id="searchInput" 
                type="text" 
                class="flex-grow p-4 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg" 
                placeholder='Search catalog (e.g., "Ozempic", "LLY", "Tirzepatide")'
            >
            <button 
                onclick="performSearch()" 
                class="bg-blue-600 hover:bg-blue-700 text-white px-8 font-semibold transition-colors text-lg"
            >
                Search
            </button>
        </div>

        <div id="resultsArea" class="mt-8">
            <div class="bg-white p-8 rounded-lg shadow-sm border border-gray-200 text-center">
                <h2 class="text-xl font-semibold mb-2">Welcome to the Catalog Index</h2>
                <p class="text-gray-600">Try searching for a brand name, generic drug, manufacturer, or stock ticker.</p>
            </div>
        </div>
    </div>

    <script>
        // This Javascript connects the HTML to your Python Server
        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const resultsArea = document.getElementById('resultsArea');
            
            if (!query) return;

            resultsArea.innerHTML = `<p class="text-center text-gray-500">Searching...</p>`;

            try {
                // 1. Call the Python Uvicorn server running on your machine
                const response = await fetch(`http://127.0.0.1:8000/api/search?query=${query}`);
                
                if (response.ok) {
                    const data = await response.json();
                    const result = data.result;
                    
                    // 2. Draw the results on the screen
                    resultsArea.innerHTML = `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-white p-6 rounded-lg border border-gray-200 shadow-sm">
                                <h3 class="text-lg font-bold text-blue-800 border-b pb-2 mb-4">Product Overview</h3>
                                <p class="mb-2"><strong>Generic:</strong> ${result.generic}</p>
                                <p class="mb-2"><strong>Brands:</strong> ${result.brands}</p>
                                <p class="mb-2"><strong>Manufacturer:</strong> ${result.manufacturer}</p>
                                <p><strong>Indications:</strong> ${result.indications}</p>
                            </div>
                            <div class="bg-white p-6 rounded-lg border border-gray-200 shadow-sm">
                                <h3 class="text-lg font-bold text-green-700 border-b pb-2 mb-4">Market Data</h3>
                                <p class="mb-2"><strong>Ticker:</strong> ${result.ticker}</p>
                                <p class="mb-2"><strong>Stock Price:</strong> ${result.stockPrice}</p>
                            </div>
                        </div>
                    `;
                } else {
                    // 3. Handle no results
                    resultsArea.innerHTML = `
                        <div class="bg-red-50 text-red-700 p-6 rounded-lg border border-red-200 text-center">
                            No results found in the current catalog index for "<strong>${query}</strong>".
                        </div>
                    `;
                }
            } catch (error) {
                resultsArea.innerHTML = `
                    <div class="bg-red-50 text-red-700 p-6 rounded-lg border border-red-200 text-center">
                        <strong>Connection Error:</strong> Cannot reach the Python backend. Make sure Uvicorn is running in your terminal!
                    </div>
                `;
            }
        }

        // Allow pressing Enter to search
        document.getElementById("searchInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                performSearch();
            }
        });
    </script>
</body>
</html>
